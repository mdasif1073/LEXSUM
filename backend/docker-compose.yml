services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "no"]

  api:
    image: python:3.11-slim
    working_dir: /app/backend
    volumes:
      - ../:/app
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    command: >
      bash -lc "
      pip install -U pip &&
      pip install -e . &&
      uvicorn app.main:app --host ${API_HOST:-0.0.0.0} --port ${API_PORT:-8000} --reload --reload-dir /app/backend --reload-dir /app/app
      "
    ports:
      - "8000:8000"
    depends_on:
      - redis
